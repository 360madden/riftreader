name: RiftReader Policy

on:
  push:
    branches:
      - main
      - "chatgpt/review-*"
  pull_request:

jobs:
  policy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Normalize Windows temp path
        run: |
          "TEMP=$env:USERPROFILE\AppData\Local\Temp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TMP=$env:USERPROFILE\AppData\Local\Temp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mcp[cli]" pillow pre-commit
      - name: Install actionlint
        run: |
          $version = "1.7.12"
          $installDir = Join-Path $env:RUNNER_TEMP "actionlint"
          $zipPath = Join-Path $env:RUNNER_TEMP "actionlint.zip"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/rhysd/actionlint/releases/download/v$version/actionlint_${version}_windows_amd64.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $installDir "actionlint.exe") -version
      - name: Pre-commit local gates
        run: python -m pre_commit run --all-files --show-diff-on-failure
      - name: Python compile
        run: |
          $files = @()
          $files += Get-ChildItem tools\riftreader_workflow -Filter *.py -File | ForEach-Object { $_.FullName }
          $files += Get-ChildItem scripts -Filter test_*.py -File | ForEach-Object { $_.FullName }
          python -m py_compile @files
      - name: Unit tests
        run: python -m unittest discover -s scripts -p "test_*.py"
      - name: Policy lint changed scope
        run: python tools/riftreader_workflow/policy_lint.py --json validate-repo --scope changed --no-write-summary
      - name: Whitespace check
        run: git diff --check
